<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ship's Core Console</title>
    <link rel="stylesheet" href="/static/style.css" />
  </head>
  <body>
    <div class="grid-shell">
      <header class="topbar">
        <div class="masthead">
          <p class="eyebrow">Reference Listening</p>
          <h1>Ship's Core Communications Console</h1>
        </div>
        <div class="status-cluster">
          <div class="status-pill" id="core-status">LINK CHECKING</div>
        </div>
      </header>

      <main class="panel-grid">
        <section class="panel">
          <div class="panel-head">
            <p class="eyebrow">Uplink Input</p>
            <h2>Enter The Question And Send</h2>
          </div>
          <form id="question-form" class="stack">
            <label>
              <span>Name / Callsign</span>
              <input type="text" id="sender-name" maxlength="80" placeholder="Unlisted" />
            </label>
            <label>
              <span>Question</span>
              <textarea id="question-text" maxlength="500" rows="8" placeholder="Enter query for the core..."></textarea>
            </label>
            <button type="submit">Query The Core</button>
          </form>
        </section>

        <section class="panel focus">
          <div class="panel-head">
            <p class="eyebrow">Transmission Queue</p>
            <h2>Current Questions</h2>
          </div>
          <div class="queue-box terminal-box">
            <div class="queue-head">
              <h3>Live Queue</h3>
              <span id="queue-count">0 records</span>
            </div>
            <ul id="current-list" class="message-list terminal-list"></ul>
          </div>
        </section>

        <section class="panel">
          <div class="panel-head">
            <p class="eyebrow">Archive Output</p>
            <h2>Questions And Responses</h2>
          </div>
          <ul id="answered-list" class="message-list terminal-list history"></ul>
        </section>
      </main>
    </div>

    <script src="/static/app.js"></script>
  </body>
</html>
